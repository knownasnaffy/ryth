<h1>ryth-list</h1>
<section>
<h2>NAME</h2>
<p>ryth-list - List discovered networks (cached)</p>
</section>
<section>
<h2>SYNOPSIS</h2>
<p><b>list</b> [<b>--watch</b>] [<b>-h</b>|<b>--help</b>] </p>
</section>
<section>
<h2>DESCRIPTION</h2>
<p>List discovered networks (cached)</p>
</section>
<section>
<h2>OPTIONS</h2>
<dl>
<dt><b>--watch</b></dt>
<dd>Re-output on each scan cycle</dd>
<dt><b>-h</b>, <b>--help</b></dt>
<dd>Print help</dd>
</dl>
</section>
