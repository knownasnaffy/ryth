<h1>ryth-autoconnect</h1>
<section>
<h2>NAME</h2>
<p>ryth-autoconnect - Toggle autoconnect for a known network</p>
</section>
<section>
<h2>SYNOPSIS</h2>
<p><b>autoconnect</b> [<b>-h</b>|<b>--help</b>] &lt;<em>SSID</em>&gt; &lt;<em>STATE</em>&gt; </p>
</section>
<section>
<h2>DESCRIPTION</h2>
<p>Toggle autoconnect for a known network</p>
</section>
<section>
<h2>OPTIONS</h2>
<dl>
<dt><b>-h</b>, <b>--help</b></dt>
<dd>Print help</dd>
<dt>&lt;<em>SSID</em>&gt;</dt>
<dd></dd>
<dt>&lt;<em>STATE</em>&gt;</dt>
<dd><br>
<em>Possible values:</em></dd>
<blockquote>
</dl>
<p><p>on</p>
<p><p>off</p>
</blockquote>
</section>
</body>
</html>
