<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ryth-status</title>
</head>
<body>
<h1>ryth-status</h1>
<section>
<h2>NAME</h2>
<p>ryth-status - Current wifi status (state, signal, powered, etc.)</p>
</section>
<section>
<h2>SYNOPSIS</h2>
<p><b>status</b> [<b>--watch</b>] [<b>-h</b>|<b>--help</b>] </p>
</section>
<section>
<h2>DESCRIPTION</h2>
<p>Current wifi status (state, signal, powered, etc.)</p>
</section>
<section>
<h2>OPTIONS</h2>
<dl>
<dt><b>--watch</b></dt>
<dd>Stream updates on change</dd>
<dt><b>-h</b>, <b>--help</b></dt>
<dd>Print help</dd>
</dl>
</section>
</body>
