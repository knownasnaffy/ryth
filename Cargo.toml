[package]
name = "ryth"
version = "0.1.0"
edition = "2024"

[dependencies]
iwdrs = { path = "../iwdrs", features = ["tokio"] }
clap = { path = "../clap", features = ["derive"] }
tokio = { version = "1", features = ["rt", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
futures-lite = "2"
